apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-rag-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
      - name: api-service
        image: <ชื่อ-ACR-ของคุณ>.azurecr.io/api-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: gemini-secret
              key: api-key
---
apiVersion: v1
kind: Service
metadata:
  name: api-service-loadbalancer
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: api-service
