apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-frontend
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-frontend
  template:
    metadata:
      labels:
        app: web-frontend
    spec:
      containers:
      - name: web-frontend
        image: stampncpragacr2026.azurecr.io/web-frontend:latest
        ports:
        - containerPort: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: web-frontend-service
  namespace: staging
spec:
  type: LoadBalancer
  ports:
  - port: 8501
    targetPort: 8501
  selector:
    app: web-frontend
