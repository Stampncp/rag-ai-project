name: CI Pipeline (Lint & Build)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Check Lint (API & Frontend)
      run: |
        pip install flake8
        # ตรวจสอบ Syntax Error และ Code Formatting
        flake8 apps/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Build Docker Images (Microservices)
      run: |
        docker build -t api-service:test ./apps/api-service
        docker build -t web-frontend:test ./apps/web-frontend
