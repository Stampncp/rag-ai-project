name: CD Pipeline (Deploy to Azure AKS)

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # 1. ล็อกอินเข้า Azure Cloud (เพิ่มสเต็ปนี้เข้ามาเพื่อให้ระบบจำสิทธิ์การเข้าถึงได้)
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 2. ล็อกอินเข้าคลังเก็บ Docker (ACR)
    - name: Log in to Azure Container Registry (ACR)
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # 3. บิวด์และอัปโหลด Docker Image ของ API
    - name: Build and Push API Service Image
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/api-service:latest ./apps/api-service
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/api-service:latest

    # 4. เชื่อมต่อ Context เข้ากับระบบควบคุม AKS (ปรับเป็น v4 และนำบรรทัด creds: ออกแล้ว)
    - name: Set up Kubernetes Context for AKS
      uses: azure/aks-set-context@v4
      with:
        cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
        resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}

    # 5. สั่งดีพลอยแอปพลิเคชันลงเซิร์ฟเวอร์คลาวด์จริง
    - name: Deploy Microservices to AKS
      run: |
        kubectl apply -f k8s/deployment.yaml