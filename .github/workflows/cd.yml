name: CD Pipeline (Deploy to Azure AKS)

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Log in to Azure Container Registry (ACR)
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and Push API Service Image
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/api-service:latest ./apps/api-service
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/api-service:latest

    - name: Set up Kubernetes Context for AKS
      uses: azure/aks-set-context@v3
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
        cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
        resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}

    - name: Deploy Microservices to AKS
      run: |
        kubectl apply -f k8s/deployment.yaml
